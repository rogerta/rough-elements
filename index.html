<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>rough-elements</title>
    <script type="module" src="/src/re-card.ts"></script>
    <script type="module" src="/src/re-icon.ts"></script>
    <style>
      .demo {
        display: flex;
        flex-direction: column;
        align-items: start;
        justify-content: start;
        gap: 1rem;
      }
      re-card::part(header), re-card::part(footer) {
        font-weight: bold;
      }
      re-card::part(header) {
        padding: 0.5rem;
        border-bottom: solid 1px rgb(160 160 160);
      }
      re-card::part(footer) {
        padding: 2rem;
        border-top: solid 1px rgb(160 160 160);
      }

      #card1 {
        --border-color: brown;
        --background-color: rgb(from var(--border-color) R G B / 0.1);
      }
      #card2 {
        --border-color: blue;
      }
      #card3 {
        max-width: 512px;
      }
      #icon1 {
        color: brown;
        background-color: rgb(from currentcolor R G B / 0.1);
      }
      #icon2 {
        --size: 64px;
      }
    </style>
  </head>
  <body>
    <div class="demo">
      <h1>re-icon</h1>
      <re-icon id="icon1" icon="back"></re-icon>
      <re-icon id="icon2" icon="check"></re-icon>
      <re-icon id="icon3" icon="close"></re-icon>
      <re-icon id="icon4" icon="warning"></re-icon>
    </div>

    <div class="demo">
      <h1>re-card</h1>
      <re-card id="card1">
        Card 1
      </re-card>
      <re-card id="card2">
        Card 2
      </re-card>
      <re-card id="card3">
        <img slot="image" src="https://images.unsplash.com/photo-1559209172-0ff8f6d49ff7?ixlib=rb-1.2.1&ixid=eyJhcHBfaWQiOjEyMDd9&auto=format&fit=crop&w=500&q=80"/>
        <div slot="header">Header</div>
        The svg element is positioned to covers the padding box of the host
        element. Overflow is visible so the rough border (SVG sub-elements) will
        can placed in the host's border box, which is outside the padding box.
        <div slot="footer">Footer</div>
      </re-card>
    </div>
  </body>
</html>
