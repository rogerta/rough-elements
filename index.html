<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>rough-elements</title>
    <script type="module" src="/src/re-card.ts"></script>
    <style>
      .demo {
        display: flex;
        flex-direction: column;
        align-items: start;
        gap: 1rem;
      }
      re-card::part(header), re-card::part(footer) {
        font-weight: bold;
      }
      re-card::part(header) {
        border-bottom: solid 1px rgb(160 160 160);
      }
      re-card::part(footer) {
        border-top: solid 1px rgb(160 160 160);
      }
      #card1 {
        --re-stroke: brown;
        --re-fill: rgb(from var(--re-stroke) R G B / 0.1);
      }
      #card2 {
        --re-stroke: blue;
      }
    </style>
  </head>
  <body>
    <div class="demo">
      <h1>re-card</h1>
      <re-card id="card1">
        Card 1
      </re-card>
      <re-card id="card2">
        Card 2
      </re-card>
      <re-card id="card3">
        <img slot="image" src="https://images.unsplash.com/photo-1559209172-0ff8f6d49ff7?ixlib=rb-1.2.1&ixid=eyJhcHBfaWQiOjEyMDd9&auto=format&fit=crop&w=500&q=80"/>
        <div slot="header">Header</div>
        The svg element is positioned to covers the padding box of the host
        element. Overflow is visible so the rough border (SVG sub-elements) will
        can placed in the host's border box, which is outside the padding box.
        <div slot="footer">Footer</div>
      </re-card>
    </div>
  </body>
</html>
